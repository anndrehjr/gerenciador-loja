services:
  db:
    image: postgres:16-alpine
    container_name: gerenciador-loja-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - interno
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: gerenciador-loja-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - interno

  app:
    build: ./app
    container_name: gerenciador-loja-app
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8090:80"
    networks:
      - interno
      - proxy

networks:
  interno:
    name: gerenciador-loja_interno
    driver: bridge
  proxy:
    name: proxy
    external: true

volumes:
  db_data:
    name: gerenciador-loja_db_data
